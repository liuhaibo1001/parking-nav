<!DOCTYPE html>
<html>
<head><title>QR Generator</title></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
  var qr = qrcode(0, 'M');
  qr.addData('https://liuhaibo1001.github.io/parking-nav');
  qr.make();
  document.body.innerHTML = qr.createSvgTag(8, 4);
</script>
</body>
</html>
